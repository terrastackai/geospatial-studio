name: integration-tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    env:
      BASE_GATEWAY_URL: ${{ secrets.BASE_GATEWAY_URL }}
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: geospatial-studio
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify env injection (non-sensitive)
        run: |
          echo "BASE_GATEWAY_URL set? ${BASE_GATEWAY_URL:+yes}"
          echo "API_KEY set? ${API_KEY:+yes}"

      - name: Run integration tests
        run: |
          python -m pytest -q -m integration --no-cov --log-file=run.log --log-file-level=INFO tests/integration/test_inference_models.py
          
