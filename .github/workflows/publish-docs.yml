name: Build and Publish Docs

on:
  push:
    branches:
      - main
      - workshop-docs-update
    paths:
      - 'docs/**'
      - 'workshop/**'
      - '.github/workflows/publish-docs.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'workshop/**'
    types: [opened, synchronize, reopened]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install hatch
        run: pip install hatch

      - name: Create hatch environment
        working-directory: .
        run: hatch env create

      - name: Build main documentation
        working-directory: .
        run: hatch run build

      - name: Build workshop documentation
        working-directory: .
        run: hatch run build-workshop

      - name: Prepare combined site
        run: |
          mkdir -p combined_site
          cp -r docs/geospatial-studio-docs/site/* combined_site/
          mkdir -p combined_site/workshop
          cp -r workshop/site/* combined_site/workshop/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/workshop-docs-update')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./combined_site
          cname: terrastackai.github.io
