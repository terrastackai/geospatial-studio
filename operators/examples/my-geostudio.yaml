# ==============================================================================
# GEOStudio Template - Environment Variable Substitution
# ==============================================================================
# This template uses environment variables for easy customization without
# needing to edit the file directly.
#
# Usage:
#   # 1. Set environment variables (required - defaults shown below)
# export NAMESPACE=default
# export CLUSTER_URL=localhost
# export MINIO_USER=minioadmin
# export MINIO_PASSWORD=minioadmin
# export POSTGRES_PASSWORD=devPostgresql123
# export REDIS_PASSWORD=redis123
# export MINIO_STORAGE=20Gi
# export POSTGRES_STORAGE=10Gi
# export GEOSERVER_STORAGE=20Gi
# export ENVIRONMENT=development
# export STORAGE_CLASS=""
# export IMAGE_PULL_POLICY=IfNotPresent
# export MLFLOW_TAG=latest
# export GATEWAY_TAG=latest
# export GEOSERVER_TAG=2.28.1
# export UI_TAG=latest
#
#   # 2. Generate and apply in one command
#   envsubst < examples/geostudio-template.yaml | kubectl apply -f -
#
# Alternative: Source defaults and override what you need
#   source examples/.env.example
#   export NAMESPACE=production
#   export POSTGRES_PASSWORD=$(openssl rand -base64 32)
#   envsubst < examples/geostudio-template.yaml | kubectl apply -f -
#
# Alternative: Generate to a file first
#   envsubst < examples/geostudio-template.yaml > my-geostudio.yaml
#   kubectl apply -f my-geostudio.yaml
#
# Note: envsubst is available on most Linux/Unix systems. On macOS, install via:
#   brew install gettext
#   brew link --force gettext
# ==============================================================================

apiVersion: geostudio.geostudio.ibm.com/v1alpha1
kind: GEOStudio
metadata:
  name: studio
  namespace: default

spec:
  # ==========================================================================
  # Infrastructure - Auto-Deploy Everything
  # ==========================================================================
  infrastructure:
    minio:
      enabled: true  # Deploy MinIO via operator
    postgresql:
      enabled: true  # Deploy PostgreSQL via operator
    keycloak:
      enabled: true  # Deploy Keycloak via operator
    geoserver:
      enabled: true  # Deploy GeoServer via operator
      adminUsername: admin
      adminPassword: geoserver
      javaOpts: "-Xms4g -Xmx8g"
      storage: "60Gi"
      storageClass: "local-path"
      image: "docker.osgeo.org/geoserver:2.28.1"
      resources:
        requests:
          memory: 4Gi
          cpu: 1000m
        limits:
          memory: 8Gi
          cpu: 2000m
    csiDriver:
      enabled: true  # Deploy IBM Object S3 CSI driver for S3 bucket mounting
  # ==========================================================================
  # Global Configuration
  # ==========================================================================
  global:
    cluster_url: localhost
    namespace: default
    environment: local
    label: geofm-studio

    backends:
      cluster_url: localhost
      namespace: default
    frontend:
      cluster_url: localhost
      namespace: default

    
    # Image pull policy
    imagePullPolicy: IfNotPresent
    
    # Image pull secret
    imagePullSecret:
      create: false
    
    # Storage configuration
    storage:
      pvc:
        enabled: true
      filesystem:
        enabled: false
    
    # Storage classes
    non_cos_storage_class: "local-path"
    
    # Object Storage - configured for auto-deployed MinIO
    objectStorage:
      endpoint: https://minio.default.svc.cluster.local:9000
      access_key: minioadmin
      secret_key: minioadmin
      region: us-east-1
      create_bucket: true
      createCosSecret: false
      cos_storage_class: "cos-s3-csi-s3fs-sc"
      buckets:
        inference: lima-inference
        inference_auxdata: lima-inference-auxdata
        fineTuning: lima-fine-tuning
        fineTuningModels: lima-fine-tuning-models
        datasetFactory: lima-dataset-factory
        amo: lima-amo
        mlflow: lima-mlflow
        geoserver: lima-geoserver
        temporaryUploads: lima-temp-uploads
    
    # PostgreSQL - configured for auto-deployed database
    postgres:
      # in_cluster_db: true
      postgres_host: postgresql.default.svc.cluster.local
      postgres_port: 5432
      postgres_username: postgres
      postgres_password: devPostgresql123
      postgres_db: postgres

      backend_uri_base: postgresql+pg8000://postgres:devPostgresql123@postgresql.default.svc.cluster.local:5432
      dbs:
        mlflow: mlflow
        gateway: geostudio
        auth: geostudio_auth
        geoserver: geoserver
    
    # Service Account
    serviceAccount:
      create: true
      name: geostudio-sa
    
    # OAuth/Authentication (disabled by default)
    oauth:
      oauthProxyEnabled: true
      oauthProxyPort: "4180"
      type: keycloak
      clientId: geostudio-client
      
      # Internal Keycloak endpoints (using cluster service)
      issuerUrl: http://keycloak.default.svc.cluster.local:8080/realms/geostudio
      oauthUrl: http://keycloak.default.svc.cluster.local:8080/realms/geostudio/protocol/openid-connect/auth
      
      # Secrets (use Kubernetes secrets in production)
      clientSecret: AUwQ0WG5N9TRIlWPW1hAJLGyaKcfP0PB
      cookieSecret: NybYeFswIAR5YH4skHzB7vvSUWLIWzOL
      extraOauthProxyArgs: [--upstream-timeout=900s]
      # TLS configuration
      createTLSSecret: false

  # oauth:

  #   oauthProxyEnabled: OAUTH_PROXY_ENABLED
  #   oauthProxyPort: "OAUTH_PROXY_PORT"
  #   type: OAUTH_TYPE # other supported types include keycloak
  #   clientId: OAUTH_CLIENT_ID
  #   # UI needs
  #   oauthUrl: OAUTH_URL # authorization_endpoint consumed by the UI 
  #   scope: "openid email profile"
  #   loginHint: loginHint
  #   prompt: prompt
  #   responseType: responseType
  #   # oauth2-proxy needs
  #   issuerUrl: OAUTH_ISSUER_URL # authorization_endpoint used in oauth2-proxy
  #   clientSecret: clientSecret
  #   cookieSecret: cookieSecret
  #   extraOauthProxyArgs: OAUTH_EXTRA_PROXY_ARGS
  #   # for kubernetes we need the tls secret
  #   createTLSSecret: CREATE_TLS_SECRET
  #   tlsCrtB64: tlsCrtB64
  #   tlsKeyB64: tlsKeyB64
  
  # ==========================================================================
  # Application Components - All Enabled with Defaults
  # ==========================================================================
  
  # MinIO - Infrastructure subchart configuration
  # Note: Configuration is duplicated here for Helm subchart consumption
  # minio:
  #   mode: standalone
  #   replicas: 1
  #   persistence:
  #     enabled: false
  #     size: 20Gi
  #   resources:
  #     requests:
  #       memory: 512Mi
  #       cpu: 250m
  #   rootUser: minioadmin
  #   rootPassword: minioadmin
  #   buckets:
  #     - name: geofm-inference
  #     - name: geofm-inference-auxdata
  #     - name: geofm-fine-tuning
  #     - name: geofm-fine-tuning-models
  #     - name: geofm-dataset-factory
  #     - name: geofm-amo
  #     - name: geofm-mlflow
  #     - name: geofm-geoserver
  #     - name: geofm-temp-uploads
  
  # # PostgreSQL - Infrastructure subchart configuration
  # # Note: Configuration is duplicated here for Helm subchart consumption
  # postgresql:
  #   auth:
  #     username: postgres
  #     password: devPostgresql123
  #     database: postgres
  #   primary:
  #     persistence:
  #       enabled: false
  #       size: 10Gi
  #     resources:
  #       requests:
  #         memory: 256Mi
  #         cpu: 250m
  #     initdb:
  #       scripts:
  #         create-geostudio-dbs.sh: |
  #           #!/bin/bash
  #           set -e
  #           psql -v ON_ERROR_STOP=1 --username "" --dbname "" <<-EOSQL
  #               SELECT 'CREATE DATABASE geostudio'
  #               WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'geostudio')\gexec
                
  #               SELECT 'CREATE DATABASE geostudio_auth'
  #               WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'geostudio_auth')\gexec
                
  #               SELECT 'CREATE DATABASE mlflow'
  #               WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'mlflow')\gexec
  #           EOSQL
  
  # Redis - Cache and Message Broker
  redis:
    enabled: true
    architecture: standalone
    fullnameOverride: "geostudio-redis"
    auth:
      enabled: true
      password: devPassword
    # master:
    #   persistence:
    #     enabled: false
    # image:
    #   repository: bitnamilegacy/redis
    #   pullPolicy: IfNotPresent
  
  # MLflow - Model Tracking
  gfm-mlflow:
    enabled: true
    image:
      name: quay.io/geospatial-studio/geostudio-mlflow
      tag: latest
    route:
      enabled: false  # Set to true on OpenShift
    # resources:
    #   limits:
    #     cpu: 2000m
    #     memory: 2Gi
    #   requests:
    #     cpu: 500m
    #     memory: 1Gi
  
  # Studio Gateway - API Server
  gfm-studio-gateway:
    enabled: true
    image:
      name: quay.io/geospatial-studio/geostudio-gateway
      tag: latest
    route:
      enabled: false  # Set to true on OpenShift
  
  # GeoServer - Geospatial Data Server
  gfm-geoserver:
    enabled: true
    image:
      repository: docker.osgeo.org/geoserver
      tag: 2.28.1
    service:
      port: 3000
      targetPort: 8080
    persistence:
      enabled: true
      size: 20Gi
    # resources:
    #   limits:
    #     cpu: 2000m
    #     memory: 4Gi
    #   requests:
    #     cpu: 500m
    #     memory: 2Gi
    route:
      enabled: false  # Set to true on OpenShift
  
  # UI - Web Interface
  geofm-ui:
    enabled: true
    image:
      name: quay.io/geospatial-studio/geostudio-ui
      tag: latest
    route:
      enabled: false  # Set to true on OpenShift
  
  # Pipelines - ML Pipelines (Optional)
  geospatial-studio-pipelines:
    enabled: false

  # Keycloak - Authentication configuration
  keycloak:
    database: keycloak
    adminUser: admin
    adminPassword: admin

# ==============================================================================
# Quick Reference
# ==============================================================================
# Common deployment scenarios:
#
# 1. Deploy to custom namespace:
#    export NAMESPACE=production
#    envsubst < geostudio-template.yaml | kubectl apply -f -
#
# 2. Production deployment with custom passwords:
#    export NAMESPACE=production
#    export CLUSTER_URL=apps.prod.example.com
#    export POSTGRES_PASSWORD=$(openssl rand -base64 32)
#    export MINIO_PASSWORD=$(openssl rand -base64 32)
#    export REDIS_PASSWORD=$(openssl rand -base64 32)
#    envsubst < geostudio-template.yaml | kubectl apply -f -
#
# 3. Deploy with larger storage:
#    export NAMESPACE=production
#    export MINIO_STORAGE=100Gi
#    export POSTGRES_STORAGE=50Gi
#    export GEOSERVER_STORAGE=100Gi
#    envsubst < geostudio-template.yaml | kubectl apply -f -
#
# 4. Check what will be deployed (dry-run):
#    envsubst < geostudio-template.yaml | kubectl apply --dry-run=client -f -
# ==============================================================================
