{{- if .Values.global.minio.enabled }}
---
# Job to generate self-signed TLS certificate for MinIO
apiVersion: batch/v1
kind: Job
metadata:
  name: tls-cert-generator
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: geostudio
    app.kubernetes.io/component: tls-generator
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-85"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geostudio
        app.kubernetes.io/component: tls-generator
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.global.serviceAccount.name }}
      containers:
      - name: cert-generator
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          # Check if TLS secrets already exist
          if kubectl get secret geofm-gateway-authentication-tls -n {{ .Values.global.namespace }} &>/dev/null && \
             kubectl get secret geofm-ui-authentication-tls -n {{ .Values.global.namespace }} &>/dev/null && \
             kubectl get secret minio-tls-secret -n {{ .Values.global.namespace }} &>/dev/null; then
            echo "✓ TLS secrets already exist, skipping generation"
            exit 0
          fi
          
          # Install openssl
          echo "Installing openssl..."
          apt-get update && apt-get install -y openssl
          
          echo "Generating self-signed TLS certificate for MinIO..."
          
          # Create OpenSSL config
          cat > /tmp/openssl.conf <<EOF
          [req]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req
          prompt = no
          
          [req_distinguished_name]
          C = US
          ST = NY
          L = NYC
          O = GeoStudio
          OU = Infrastructure
          CN = {{ .Values.global.namespace }}.svc.cluster.local
          
          [v3_req]
          basicConstraints = CA:TRUE
          subjectAltName = @alt_names
          
          [alt_names]
          IP.1 = 127.0.0.1
          DNS.1 = localhost
          DNS.2 = {{ .Values.global.namespace }}.svc.cluster.local
          DNS.3 = minio.{{ .Values.global.namespace }}.svc.cluster.local
          {{- if contains "minio" .Values.global.objectStorage.endpoint }}
          DNS.4 = {{ .Values.global.objectStorage.endpoint | replace "https://" "" | replace "http://" "" | replace ":9000" "" }}
          {{- end }}
          EOF
          
          # Generate private key for minio
          openssl genrsa -out /tmp/tls.key 2048
          
          # Generate self-signed certificate (2 years validity)
          openssl req -new -x509 -nodes -days 730 \
            -keyout /tmp/tls.key \
            -out /tmp/tls.crt \
            --config /tmp/openssl.conf
          
          echo "Certificate generated successfully"
          openssl x509 -in /tmp/tls.crt -noout -text | grep -A2 "Subject Alternative Name"
          
          # TODO: Use a single geostudio-tls-secret for ui, gateway and minio
          # Create Kubernetes secret
          kubectl create secret tls minio-tls-secret \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key \
            --namespace={{ .Values.global.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Create Kubernetes secret
          kubectl create secret tls geofm-gateway-authentication-tls \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key \
            --namespace={{ .Values.global.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Create Kubernetes secret
          kubectl create secret tls geofm-ui-authentication-tls \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key \
            --namespace={{ .Values.global.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "tls secrets created in {{ .Values.global.namespace }} namespace"
          
          # Create ConfigMap with CA certificate for CSI driver in kube-system
          echo "Creating ConfigMap with CA certificate in kube-system namespace for CSI driver..."
          kubectl create configmap minio-ca-cert \
            --from-file=ca.crt=/tmp/tls.crt \
            --namespace=kube-system \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✓ ConfigMap minio-ca-cert created in kube-system namespace"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}

