{{- if and .Values.infrastructure.minio.enabled (eq .Values.global.objectStorage.cos_storage_class "cos-s3-csi-s3fs-sc") }}
---
# Job to restart CSI driver after MinIO CA certificate is created
# This ensures the CSI driver picks up the new certificate for TLS verification
apiVersion: batch/v1
kind: Job
metadata:
  name: csi-driver-restart
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: geostudio
    app.kubernetes.io/component: csi-driver-restart
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-65"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geostudio
        app.kubernetes.io/component: csi-driver-restart
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.global.serviceAccount.name }}
      containers:
      - name: csi-restart
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          echo "=================================================="
          echo "CSI Driver Restart Job"
          echo "=================================================="
          echo "This job restarts the S3 CSI controller to ensure"
          echo "it picks up the MinIO CA certificate"
          echo "=================================================="
          
          # Wait for minio-ca-cert ConfigMap to exist in kube-system
          echo "Waiting for minio-ca-cert ConfigMap in kube-system..."
          for i in {1..30}; do
            if kubectl get configmap minio-ca-cert -n kube-system >/dev/null 2>&1; then
              echo "✓ ConfigMap found!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: minio-ca-cert ConfigMap not found after 30 attempts"
              exit 1
            fi
            echo "Attempt $i/30: ConfigMap not found yet, waiting..."
            sleep 2
          done
          
          # Find the CSI controller pod
          echo ""
          echo "Finding S3 CSI controller pod..."
          CSI_POD=$(kubectl get pods -n kube-system -l app.kubernetes.io/name=ibm-object-csi-controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
                    kubectl get pods -n kube-system --no-headers | grep 'cos-s3-csi-controller' | awk '{print $1}' | head -1)
          
          if [ -z "$CSI_POD" ]; then
            echo "WARNING: S3 CSI controller pod not found. Skipping restart."
            echo "If you're using S3 CSI driver, ensure it's deployed in kube-system."
            exit 0
          fi
          
          echo "✓ Found CSI controller pod: $CSI_POD"
          
          # Check if pod is already using the certificate (by checking volume mounts)
          echo ""
          echo "Checking if CSI controller has minio-ca-cert mounted..."
          if kubectl get pod $CSI_POD -n kube-system -o yaml | grep -q "minio-ca-cert"; then
            echo "✓ minio-ca-cert volume is already mounted"
            
            # Restart the pod to ensure it picks up the certificate
            echo ""
            echo "Restarting CSI controller to reload certificates..."
            kubectl delete pod $CSI_POD -n kube-system
            
            # Wait for new pod to be ready
            echo "Waiting for new CSI controller pod to be ready..."
            sleep 5
            kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=ibm-object-csi-controller -n kube-system --timeout=120s 2>/dev/null || \
              kubectl wait --for=condition=ready pod -n kube-system --selector=app=cos-s3-csi-controller --timeout=120s 2>/dev/null || \
              echo "Note: Could not wait for pod readiness, but restart was triggered"
            
            echo "✓ CSI controller restarted successfully!"
          else
            echo "Note: minio-ca-cert not mounted on CSI controller. Certificate verification may not work."
          fi
          
          echo ""
          echo "=================================================="
          echo "CSI driver restart completed!"
          echo "=================================================="
{{- end }}
