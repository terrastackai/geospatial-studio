apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    config.openshift.io/inject-trusted-cabundle: "true"
  name: {{ .Values.global.appNames.ui }}-trusted-certificates-ca
  namespace: {{ .Values.global.namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.global.appNames.ui }}-configmap
  namespace: {{ .Values.global.namespace }}
data:
  {{- /* Extra environment variables to be passed for the Values.extraEnvironment */ -}}
  {{- range $name, $value := .Values.extraEnvironment }}
  {{ $name }}: {{ quote $value }}
  {{- end }}
  # Always use internal Kubernetes service URLs regardless of route.enabled
  MLFLOW_URL: {{ printf "%s.%s.svc.cluster.local:5000" .Values.global.appNames.mlflow .Values.global.backends.namespace | quote }}
  GEOFM_GEOSERVER: {{ printf "%s.%s.svc.cluster.local:3000" .Values.global.appNames.geoserver .Values.global.backends.namespace | quote }}
  STUDIO_GATEWAY_API_URL: {{ printf "%s.%s.svc.cluster.local:%s" .Values.global.appNames.gateway .Values.global.backends.namespace .Values.global.oauth.oauthProxyPort | quote }}
