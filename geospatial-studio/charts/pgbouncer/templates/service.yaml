{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.fullnameOverride }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: pgbouncer
    port: {{ .Values.service.port }}
    targetPort: pgbouncer
    protocol: TCP
  selector:
    app: {{ .Values.fullnameOverride }}
{{- end }}
