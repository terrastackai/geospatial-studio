{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.fullnameOverride }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.fullnameOverride }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.postgresql.password | quote }}
  pgbouncer-password: {{ .Values.auth.password | quote }}
{{- end }}
