apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gfm-mlflow.fullname" . }}
  namespace: {{.Values.global.namespace}}
  labels:
    {{- include "gfm-mlflow.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gfm-mlflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gfm-mlflow.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.global.imagePullSecret.b64secret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret.name }}
      {{- end }}
      serviceAccountName: {{ include "gfm-mlflow.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.global.imagePullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              export PYTHONUSERBASE=/mlruns/.pip-packages
              export PATH="$PYTHONUSERBASE/bin:$PATH"
              pip install --user psycopg2-binary
              exec mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --allowed-hosts "*" \
                --backend-store-uri $(BACKEND_URI) \
                --artifacts-destination file:///mlruns
          env:
          - name: MLFLOW_SQLALCHEMYSTORE_POOL_SIZE
            value: "1"
          - name: MLFLOW_SQLALCHEMYSTORE_MAX_OVERFLOW
            value: "0"
          envFrom:
          - secretRef:
              name: {{ .Values.global.appNames.mlflow }}-secrets
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{ if .Values.tolerations.enabled }}
      tolerations:
        {{- toYaml .Values.tolerations.configs | nindent 8 }}
      {{ end }}
