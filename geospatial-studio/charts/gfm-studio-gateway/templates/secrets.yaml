apiVersion: v1
kind: Secret
metadata:
  name: auth-seed
type: Opaque
data:
  session_secret: {{ .Values.authseed }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.appNames.gateway }}-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-40"
  labels:
    app.kubernetes.io/name: {{ .Values.global.appNames.gateway }}
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  OBJECT_STORAGE_KEY_ID: {{ .Values.global.objectStorage.access_key }}
  OBJECT_STORAGE_SEC_KEY: {{ .Values.global.objectStorage.secret_key }}
  SH_CLIENT_ID: {{ .Values.global.sentinelhub.client_id }}
  SH_CLIENT_SECRET: {{ .Values.global.sentinelhub.client_secret }}
  DATABASE_URI: {{ include "geospatial-studio.postgres.gateway.uri" . | quote }}
  AUTH_DATABASE_URI: {{ include "geospatial-studio.postgres.auth.uri" . | quote }}
  MLFLOW_DATABASE_URI: {{ include "geospatial-studio.postgres.mlflow.uri" . | quote }}
  {{- if .Values.global.redis.enabled }}
  REDIS_URL: {{ include "geospatial-studio.redis.url" . | quote }}
  {{- end }}
  
  FT_API_KEY: {{ .Values.global.gfmStudioGateway.api_key | quote }}
  API_ENCRYPTION_KEY: {{ .Values.global.gfmStudioGateway.api_encryption_key | quote }}
  JIRA_API_KEY: {{ .Values.global.jira.api_key | quote }}
  
  # Extra Environment Variables
  {{- range $name, $value := .Values.extraEnvironment.secrets }}
  {{ $name }}: {{ quote $value }}
  {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.appNames.gateway }}-jobs-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-40"
type: Opaque
stringData:
  # Object Storage credentials
  OBJECT_STORAGE_KEY_ID: {{ .Values.global.objectStorage.access_key | quote }}
  OBJECT_STORAGE_SEC_KEY: {{ .Values.global.objectStorage.secret_key | quote }}
  
  # Database URIs - Jobs use direct postgres connections (bypass pgbouncer)
  DATABASE_URI: {{ include "geospatial-studio.postgres.gateway.jobs.uri" . | quote }}
  AUTH_DATABASE_URI: {{ include "geospatial-studio.postgres.auth.jobs.uri" . | quote }}
  MLFLOW_DATABASE_URI: {{ include "geospatial-studio.postgres.mlflow.jobs.uri" . | quote }}
  FT_API_KEY: {{ .Values.global.gfmStudioGateway.api_key | quote }}

  # Redis URL (if enabled)
  {{- if .Values.global.redis.enabled }}
  REDIS_URL: {{ include "geospatial-studio.redis.url" . | quote }}
  {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Values.global.namespace }}
  name: geoft-cronjob-secrets
type: Opaque
stringData:
  FT_API_KEY: {{ .Values.global.gfmStudioGateway.api_key }}
  FT_WEBHOOKS_ID: {{ .Values.webhook_event_id }}
  GEOFT_WEBHOOK_URL: {{ printf "https://%s-%s.%s/v2/notifications" .Values.global.appNames.gateway .Values.global.namespace .Values.global.cluster_url }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.appNames.gateway }}-cos-secret
type: ibm/ibmc-s3fs
data:
  access-key: {{ .Values.global.objectStorage.access_key | b64enc | quote }}
  secret-key: {{ .Values.global.objectStorage.secret_key | b64enc | quote }}

---
{{- $globalSecretType := .Values.global.secretType -}}
{{- range $name, $details := .Values.secret }}
{{- if $details.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $details.secretName }}
  annotations:
    {{ default "{}" $details.annotations }}
stringData:
  {{- /* Secret in raw string data format. Not base64 */ -}}
  {{- range $key, $value := $details.secretStringData }}
  {{ $key }}: {{ quote $value }}
  {{- end }}
type: {{ $details.customSecretType | default $globalSecretType }}
--- 
{{- end -}}
{{- end }}
---
{{- /* tls secret for kubernetes environment */ -}}
{{- if and (.Values.global.oauth.oauthProxyEnabled)  (.Values.global.oauth.createTLSSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.appNames.gateway }}-authentication-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.global.oauth.tlsCrtB64 | quote }}
  tls.key: {{ .Values.global.oauth.tlsKeyB64 | quote }}
{{- end }}
