    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mountLocations.models_pvc_name }} # Enter the name of the PVC.
  namespace: {{ .Values.global.namespace }}
spec:
  storageClassName: {{ .Values.global.non_cos_storage_class }}
