{{- else if eq .Values.global.storage.storageMode "cluster-block-storage" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mountLocations.pipelines_pvc_name }} # Enter the name of the PVC.
  namespace: {{ .Values.global.namespace }}
spec:
  storageClassName: {{ .Values.global.non_cos_storage_class }}
  accessModes:
    - {{ .Values.global.pvc_access_mode }}
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mountLocations.files_pvc_name }} # Enter the name of the PVC.
  namespace: {{ .Values.global.namespace }}
spec:
  storageClassName: {{ .Values.global.non_cos_storage_class }}
  accessModes:
    - {{ .Values.global.pvc_access_mode }}
