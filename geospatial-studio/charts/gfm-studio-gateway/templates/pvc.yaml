{{- else if eq .Values.global.storage.storageMode "local-hostpath" }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: studio-inference-pv-volume
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 40Gi
  accessModes:
    - ReadWriteMany
  claimRef:
    name: {{ .Values.mountLocations.pipelines_pvc_name }} # Enter the name of the PVC.
    namespace: {{ .Values.global.namespace }}
  hostPath:
    path: "/data/studio-inference-pvc"
