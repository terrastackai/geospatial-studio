apiVersion: v1
kind: ConfigMap
metadata:
  name:  pipeline-gateway-cm
  namespace: {{ .Values.namespace }}
  labels:
    app:  pipeline-gateway
data:
  inference_task_table: {{ .Values.orchestrate_db.inference_task_table }}
  geoserver_url: {{ printf "http://%s.%s.svc.cluster.local:3000/geoserver" .Values.geoserver.appName .Values.namespace }}
  {{- if .Values.gateway.oauthProxyEnabled }}
  gfmaas_api_base_url: {{ printf "https://%s.%s.svc.cluster.local:%s/v2/" .Values.gateway.appName .Values.namespace .Values.gateway.oauthProxyPort }}
  {{- else }}
  gfmaas_api_base_url: {{ printf "http://%s.%s.svc.cluster.local:8000/v2/" .Values.gateway.appName .Values.namespace }}
  {{- end }}

---
{{- if and (hasKey .Values "observability") (hasKey .Values.observability "enabled") .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name:  pipeline-observability-cm
  namespace: {{ .Values.namespace }}
data:
  OTEL_TRACES_EXPORTER: console,otlp
  OTEL_METRICS_EXPORTER: console,otlp
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otlp.endpoint }}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: {{ .Values.observability.otlp.tracesEndpoint }}
  OTEL_PYTHON_LOG_LEVEL: debug
{{- end }}
